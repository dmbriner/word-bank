name: Add Word

on:
  workflow_dispatch:
    inputs:
      word:
        description: "Word to save"
        required: true
        type: string
      source_title:
        description: "Book or source title"
        required: false
        type: string
        default: ""
      author:
        description: "Author name"
        required: false
        type: string
        default: ""
      location:
        description: "Page, chapter, or location"
        required: false
        type: string
        default: ""
      app:
        description: "App (e.g. Apple Books, Kindle)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  add-word:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Save word
        run: |
          node tools/add-word.mjs "${{ github.event.inputs.word }}" \
            --source-title "${{ github.event.inputs.source_title }}" \
            --author "${{ github.event.inputs.author }}" \
            --location "${{ github.event.inputs.location }}" \
            --app "${{ github.event.inputs.app }}"

      - name: Commit and push
        run: |
          git config user.name "Word Bank Bot"
          git config user.email "actions@github.com"
          git add data/words.json
          git diff --staged --quiet || git commit -m "Add word: ${{ github.event.inputs.word }}"
          git push
