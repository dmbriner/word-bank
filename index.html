<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dana's Word Bank</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="app-title">
        <div>
          <p class="kicker">Vocabulary dictionary</p>
          <h1 id="app-title">Dana's Word Bank</h1>
          <p class="hero-copy">
            My favorite words and phrasings, saved while reading and organized for essay writing.
          </p>
        </div>
        <div class="hero-tools" aria-label="Library stats">
          <span><strong id="word-count">0</strong> words</span>
          <span><strong id="prose-count">0</strong> phrasings</span>
        </div>
      </section>

      <section class="controls" aria-label="Search and filters">
        <label class="search-field">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="Search saved words, definitions, or sources" />
        </label>

        <div class="filter-group" aria-label="Part of speech filter">
          <button class="filter-button active" data-filter="all" type="button">All</button>
          <button class="filter-button" data-filter="noun" type="button">Nouns</button>
          <button class="filter-button" data-filter="verb" type="button">Verbs</button>
          <button class="filter-button" data-filter="adjective" type="button">Adjectives</button>
          <button class="filter-button" data-filter="adverb" type="button">Adverbs</button>
          <button class="filter-button" data-filter="other" type="button">Other</button>
        </div>
      </section>

      <section class="library-panel" aria-labelledby="library-title">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Defined and sorted automatically</p>
            <h2 id="library-title">Saved Words</h2>
          </div>
        </div>
        <div id="word-list" class="word-list" aria-live="polite"></div>
      </section>

      <section class="prose-panel" aria-labelledby="prose-title">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Strong prose</p>
            <h2 id="prose-title">Favorite Phrasings</h2>
          </div>
        </div>
        <div id="prose-list" class="prose-list" aria-live="polite"></div>
      </section>
    </main>

    <template id="word-card-template">
      <article class="word-card">
        <div class="word-card-top">
          <div>
            <p class="part"></p>
            <h3></h3>
          </div>
        </div>
        <p class="definition"></p>
        <p class="example"></p>
        <footer></footer>
      </article>
    </template>

    <template id="prose-card-template">
      <article class="prose-card">
        <blockquote></blockquote>
        <footer></footer>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
