<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dana's Word Bank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="app-title">
        <div>
          <p class="kicker">Essay vocabulary record</p>
          <h1 id="app-title">Dana's Word Bank</h1>
          <p class="hero-copy">
            A running record of words learned while reading, with definitions, grammar, and the place each word came from.
          </p>
        </div>
        <div class="hero-tools" aria-label="Library stats">
          <span><strong id="word-count">0</strong> words</span>
          <span><strong id="prose-count">0</strong> prose notes</span>
        </div>
      </section>

      <section class="controls" aria-label="Search and filters">
        <label class="search-field">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="Search words, definitions, or where you learned them" />
        </label>

        <div class="filter-group" aria-label="Part of speech filter">
          <button class="filter-button active" data-filter="all" type="button">All</button>
          <button class="filter-button" data-filter="noun" type="button">Nouns</button>
          <button class="filter-button" data-filter="verb" type="button">Verbs</button>
          <button class="filter-button" data-filter="adjective" type="button">Adjectives</button>
          <button class="filter-button" data-filter="adverb" type="button">Adverbs</button>
          <button class="filter-button" data-filter="other" type="button">Other</button>
        </div>
      </section>

      <div class="workspace">
        <section class="entry-panel" aria-labelledby="word-form-title">
          <h2 id="word-form-title">Add a Word</h2>
          <form id="word-form">
            <label>
              Word
              <input id="word" name="word" autocomplete="off" placeholder="obsequious" required />
            </label>

            <button id="lookup-definition" class="ghost-button lookup-button" type="button">Fill Definition</button>

            <label>
              Part of speech
              <select id="part-of-speech" name="partOfSpeech">
                <option value="noun">Noun</option>
                <option value="verb">Verb</option>
                <option value="adjective">Adjective</option>
                <option value="adverb">Adverb</option>
                <option value="other">Other</option>
              </select>
            </label>

            <label>
              Definition
              <textarea id="definition" name="definition" rows="4" placeholder="Auto-filled when possible; editable before saving"></textarea>
            </label>

            <label>
              Essay-use note
              <textarea id="context" name="context" rows="3" placeholder="Example: useful for describing servile praise or calculated flattery"></textarea>
            </label>

            <div class="source-grid">
              <label>
                Book title
                <input id="book-title" name="bookTitle" placeholder="Middlemarch" />
              </label>

              <label>
                Author
                <input id="author" name="author" placeholder="George Eliot" />
              </label>
            </div>

            <div class="source-grid">
              <label>
                Publisher
                <input id="publisher" name="publisher" placeholder="Penguin Classics" />
              </label>

              <label>
                Year
                <input id="year" name="year" inputmode="numeric" placeholder="2003" />
              </label>
            </div>

            <label>
              Where you learned it
              <input id="learned-at" name="learnedAt" placeholder="Trillion Dollar Triage, page 42; article; class notes..." />
            </label>

            <button class="primary-button" type="submit">Save Word</button>
          </form>
        </section>

        <section class="library-panel" aria-labelledby="library-title">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Alphabetized automatically</p>
              <h2 id="library-title">Words for Essays</h2>
            </div>
            <button id="clear-words" class="ghost-button" type="button">Clear all</button>
          </div>
          <div id="word-list" class="word-list" aria-live="polite"></div>
        </section>
      </div>

      <section class="prose-section" aria-labelledby="prose-title">
        <div class="prose-form">
          <h2 id="prose-title">Strong Prose</h2>
          <form id="prose-form">
            <label>
              Passage
              <textarea id="prose-text" rows="4" required placeholder="A sentence or paragraph worth keeping"></textarea>
            </label>
            <div class="source-grid">
              <label>
                Book title
                <input id="prose-book-title" placeholder="The Waves" />
              </label>
              <label>
                Author
                <input id="prose-author" placeholder="Virginia Woolf" />
              </label>
            </div>
            <div class="source-grid">
              <label>
                Publisher
                <input id="prose-publisher" placeholder="Harcourt" />
              </label>
              <label>
                Year
                <input id="prose-year" inputmode="numeric" placeholder="1931" />
              </label>
            </div>
            <label>
              Note
              <input id="prose-note" placeholder="What made it work, or where you might imitate it" />
            </label>
            <button class="primary-button" type="submit">Save Prose</button>
          </form>
        </div>
        <div id="prose-list" class="prose-list" aria-live="polite"></div>
      </section>
    </main>

    <template id="word-card-template">
      <article class="word-card">
        <div class="word-card-top">
          <div>
            <p class="part"></p>
            <h3></h3>
          </div>
          <button class="icon-button delete-word" type="button" aria-label="Delete word">×</button>
        </div>
        <p class="definition"></p>
        <p class="context"></p>
        <footer></footer>
      </article>
    </template>

    <template id="prose-card-template">
      <article class="prose-card">
        <button class="icon-button delete-prose prose-actions" type="button" aria-label="Delete prose">×</button>
        <blockquote></blockquote>
        <p class="prose-note"></p>
        <footer></footer>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
